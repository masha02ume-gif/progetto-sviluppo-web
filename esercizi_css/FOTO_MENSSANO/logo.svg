<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 82">
  <defs>
    <filter id="ombra" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="black" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Small italic text top row -->
  <text
    x="260"
    y="22"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="10"
    font-style="italic"
    letter-spacing="3"
