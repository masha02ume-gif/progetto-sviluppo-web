  <!-- Main large text -->
  <text
    x="260"
    y="62"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="900"
    letter-spacing="1.5"
    fill="white"
    text-anchor="middle"
    filter="url(#ombra)">MensSanoInCorporeSano</text>

</svg>
